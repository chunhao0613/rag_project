replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: rag_project-rag-app
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8000

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

config:
  STREAMLIT_SERVER_PORT: "8000"
  STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
  GOOGLE_CHAT_MODEL: gemini-2.0-flash-lite
  GOOGLE_EMBEDDING_MODEL: models/gemini-embedding-001
  HF_LLM_MODELS: mistralai/Mistral-7B-Instruct-v0.3,microsoft/phi-3.5-mini-instruct
  HF_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
  COHERE_EMBEDDING_MODEL: embed-multilingual-v3.0
  TOGETHER_EMBEDDING_MODEL: BAAI/bge-small-en-v1.5

secret:
  create: true
  data:
    GOOGLE_API_KEY: "<replace-google-api-key>"
    COHERE_API_KEY: "<replace-cohere-api-key>"
    TOGETHER_API_KEY: "<replace-together-api-key>"
    HF_API_KEY: "<replace-hf-api-key>"
    GROQ_API_KEY: "<replace-groq-api-key>"
    GITHUB_MODELS_TOKEN: "<replace-github-models-token>"

probes:
  readiness:
    path: /_stcore/health
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /_stcore/health
    initialDelaySeconds: 45
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

persistence:
  enabled: true
  existingClaim: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  storageClassName: ""
  mountPath: /app/data

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
