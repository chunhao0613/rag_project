replicaCount: 1

image:
  repository: rag_project-rag-app
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

config:
  STREAMLIT_SERVER_PORT: "8000"
  STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
  GOOGLE_CHAT_MODEL: gemini-2.0-flash-lite
  GOOGLE_EMBEDDING_MODEL: models/gemini-embedding-001

secret:
  create: true
  data:
    GOOGLE_API_KEY: dev-placeholder
    COHERE_API_KEY: dev-placeholder
    TOGETHER_API_KEY: dev-placeholder
    HF_API_KEY: dev-placeholder
    GROQ_API_KEY: dev-placeholder
    GITHUB_MODELS_TOKEN: dev-placeholder

persistence:
  enabled: true
  existingClaim: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /app/data
