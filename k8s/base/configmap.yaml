apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-app-config
  namespace: rag-mvp
  labels:
    app.kubernetes.io/name: rag-project
data:
  STREAMLIT_SERVER_PORT: "8000"
  STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
  GOOGLE_CHAT_MODEL: "gemini-2.0-flash-lite"
  GOOGLE_EMBEDDING_MODEL: "models/gemini-embedding-001"
  HF_LLM_MODELS: "mistralai/Mistral-7B-Instruct-v0.3,microsoft/phi-3.5-mini-instruct"
  HF_EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  COHERE_EMBEDDING_MODEL: "embed-multilingual-v3.0"
  TOGETHER_EMBEDDING_MODEL: "BAAI/bge-small-en-v1.5"
