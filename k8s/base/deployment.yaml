apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-app
  namespace: rag-mvp
  labels:
    app.kubernetes.io/name: rag-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-app
  template:
    metadata:
      labels:
        app: rag-app
        app.kubernetes.io/name: rag-project
    spec:
      containers:
        - name: rag-app
          image: rag_project-rag-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: rag-app-config
            - secretRef:
                name: rag-app-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: rag-data
              mountPath: /app/data
      volumes:
        - name: rag-data
          persistentVolumeClaim:
            claimName: rag-data-pvc
