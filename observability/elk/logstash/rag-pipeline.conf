input {
  beats {
    port => 5044
  }
}

filter {
  json {
    source => "message"
    target => "rag"
  }

  if ![rag][timestamp] {
    mutate {
      add_field => { "[rag][timestamp]" => "%{@timestamp}" }
    }
  }

  mutate {
    rename => {
      "[rag][request_id]" => "request_id"
      "[rag][provider]" => "provider"
      "[rag][error_type]" => "error_type"
      "[rag][event]" => "event"
      "[rag][component]" => "component"
      "[rag][host]" => "host"
    }
  }

  date {
    match => ["[rag][timestamp]", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "rag-app-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
