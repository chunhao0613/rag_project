groups:
  - name: rag-app-alerts
    rules:
      - alert: RagAppDown
        expr: up{job="rag-app"} == 0
        for: 2m
        labels:
          severity: critical
          service: rag-app
        annotations:
          summary: RAG app is down
          description: Prometheus cannot scrape rag-app on port 8001 for more than 2 minutes.

      - alert: RagAppHighErrorRate
        expr: |
          sum(rate(rag_request_errors_total[5m]))
          /
          clamp_min(sum(rate(rag_requests_total[5m])), 1)
          > 0.05
        for: 5m
        labels:
          severity: warning
          service: rag-app
        annotations:
          summary: RAG app error rate is high
          description: More than 5% of recent RAG actions are failing over a 5 minute window.

      - alert: RagAppHighLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(rag_request_duration_seconds_bucket[5m])) by (le, action)
          ) > 3
        for: 10m
        labels:
          severity: warning
          service: rag-app
        annotations:
          summary: RAG app latency is high
          description: The 95th percentile latency for embedding or query actions is above 3 seconds.
