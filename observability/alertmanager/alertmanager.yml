global:
  resolve_timeout: 5m

route:
  receiver: rag-default
  group_by:
    - alertname
    - service
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: rag-default
    webhook_configs:
      - url: http://alert-webhook:5001/alerts
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal:
      - alertname
      - service
